apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: services
  namespace: flux-system
spec:
  dependsOn:
  - name: infra-apps
    namespace: flux-system
  interval: 10m
  path: kubernetes/services
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
