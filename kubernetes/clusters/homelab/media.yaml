apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-config
  namespace: flux-system
spec:
  dependsOn:
  - name: controllers
    namespace: flux-system
  interval: 10m
  path: kubernetes/media/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-apps
  namespace: flux-system
spec:
  dependsOn:
  - name: media-config
    namespace: flux-system
  interval: 10m
  path: kubernetes/media/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
