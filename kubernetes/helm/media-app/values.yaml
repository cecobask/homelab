affinity: ~
httpRoute:
  enabled: false
  hostname: ~
  parentRefs:
  - name: envoy
    namespace: envoy-gateway
  timeouts:
    request: 30s
image:
  repository: ~
  tag: ~
livenessProbe: ~
name: ~
persistence:
  accessModes:
  - ReadWriteOnce
  capacity: ~
  enabled: false
  name: config
  storageClassName: proxmox
readinessProbe: ~
resources: ~
securityContext:
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch
service:
  port: 80
  targetPort: ~
startupProbe: ~
volumeMounts:
- mountPath: /config
  name: config
- mountPath: /media
  name: media
volumes:
- name: media
  persistentVolumeClaim:
    claimName: media
