apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
- name: homepage
  namespace: homepage
  files:
  - bookmarks.yaml
  - custom.css
  - kubernetes.yaml
  - services.yaml
  - settings.yaml
  - widgets.yaml
  literals:
  - custom.js=
  - docker.yaml=
  - proxmox.yaml=
  options:
    disableNameSuffixHash: true
resources:
- helmrelease.yaml
- namespace.yaml
