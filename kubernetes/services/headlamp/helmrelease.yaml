apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
      version: 0.43.0
  interval: 1h
  values:
    clusterRoleBinding:
      clusterRoleName: headlamp
    config:
      unsafeUseServiceAccountToken: true
    httpRoute:
      enabled: true
      hostnames:
      - headlamp.cecobask.com
      parentRefs:
      - name: envoy
        namespace: envoy-gateway
    initContainers:
    - command:
      - /bin/sh
      - -c
      - mkdir -p /headlamp/plugins && cp -r /plugins/* /headlamp/plugins/ && chown -R 100:101 /headlamp
      image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
      name: plugin-flux
      securityContext:
        runAsNonRoot: false
        privileged: false
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
      - mountPath: /headlamp/plugins
        name: plugins
    resources:
      limits: ~
      requests:
        cpu: 100m
        memory: 150Mi
    volumeMounts:
    - mountPath: /headlamp/plugins
      name: plugins
    volumes:
    - name: plugins
      emptyDir: {}
