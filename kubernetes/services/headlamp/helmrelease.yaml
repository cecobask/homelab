apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      sourceRef:
        kind: HelmRepository
        name: headlamp
      version: 0.43.0
  interval: 1h
  values:
    config:
      unsafeUseServiceAccountToken: true
    httpRoute:
      enabled: true
      hostnames:
      - headlamp.cecobask.com
      parentRefs:
      - name: envoy
        namespace: envoy-gateway
    resources:
      limits: ~
      requests:
        cpu: 100m
        memory: 150Mi
