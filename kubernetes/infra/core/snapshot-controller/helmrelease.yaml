apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: kube-system
spec:
  chart:
    spec:
      chart: snapshot-controller
      sourceRef:
        kind: HelmRepository
        name: piraeus
      version: 4.2.0
  interval: 1h
  values:
    controller:
      resources:
        requests:
          cpu: 20m
          memory: 100Mi
