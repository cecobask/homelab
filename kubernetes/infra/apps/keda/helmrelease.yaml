apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  chart:
    spec:
      chart: keda
      sourceRef:
        kind: HelmRepository
        name: keda
      version: 2.18.3
  dependsOn:
  - name: cert-manager
    namespace: cert-manager
  interval: 1h
  values:
    certificates:
      autoGenerated: false
      certManager:
        enabled: true
        generateCA: false
        issuer:
          generate: false
          name: internal-ca
    resources:
      metricServer:
        limits: ~
        requests:
          cpu: 20m
          memory: 150Mi
      operator:
        limits: ~
        requests:
          cpu: 20m
          memory: 150Mi
      webhooks:
        limits: ~
        requests:
          cpu: 10m
          memory: 100Mi
