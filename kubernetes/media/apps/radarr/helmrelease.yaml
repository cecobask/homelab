apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  chartRef:
    kind: HelmChart
    name: media-app
    namespace: flux-system
  interval: 1h
  values:
    httpRoute:
      enabled: true
      hostname: radarr.cecobask.com
      timeouts:
        request: 3m
    image:
      repository: ghcr.io/home-operations/radarr
      tag: 6.0.3
    livenessProbe:
      failureThreshold: 5
      httpGet:
        path: /ping
        port: 7878
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
    name: radarr
    persistence:
      enabled: true
      capacity: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
    service:
      targetPort: 7878
    volumeMounts:
    - mountPath: /config
      name: config
    - mountPath: /config/MediaCover
      subPath: radarr/MediaCover
      name: media
    - mountPath: /movies
      subPath: movies
      name: media
    - mountPath: /torrents
      subPath: torrents/movies
      name: media
