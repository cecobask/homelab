apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
  namespace: media
spec:
  chartRef:
    kind: HelmChart
    name: media-app
    namespace: flux-system
  interval: 1h
  values:
    env:
    - name: PUID
      value: "0"
    - name: PGID
      value: "0"
    httpRoute:
      enabled: true
      hostname: shelfmark.cecobask.com
    image:
      repository: ghcr.io/calibrain/shelfmark
      tag: v1.3.2
    livenessProbe:
      failureThreshold: 5
      httpGet:
        path: /api/health
        port: 8084
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
    name: shelfmark
    persistence:
      enabled: true
      capacity: 1Gi
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    resources:
      requests:
        cpu: 10m
        memory: 300Mi
    service:
      targetPort: 8084
    volumeMounts:
    - mountPath: /audiobooks
      name: media
      subPath: audiobooks
    - mountPath: /books
      name: media
      subPath: books
    - mountPath: /config
      name: config
    - mountPath: /torrents/audiobooks
      name: media
      subPath: torrents/audiobooks
    - mountPath: /torrents/books
      name: media
      subPath: torrents/books
