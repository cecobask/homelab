apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
spec:
  chartRef:
    kind: HelmChart
    name: media-app
    namespace: flux-system
  interval: 1h
  values:
    httpRoute:
      enabled: true
      hostname: prowlarr.cecobask.com
    image:
      repository: ghcr.io/home-operations/prowlarr
      tag: 2.3.6
    livenessProbe:
      failureThreshold: 5
      httpGet:
        path: /ping
        port: 9696
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
    name: prowlarr
    persistence:
      enabled: true
      capacity: 1Gi
    resources:
      requests:
        cpu: 40m
        memory: 200Mi
    service:
      targetPort: 9696
    volumeMounts:
    - mountPath: /config
      name: config
    volumes: ~
