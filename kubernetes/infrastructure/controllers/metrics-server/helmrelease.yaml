apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  chart:
    spec:
      chart: metrics-server
      sourceRef:
        kind: HelmRepository
        name: metrics-server
      version: 3.13.1
  dependsOn:
  - name: cert-manager
    namespace: cert-manager
  interval: 1h
  values:
    apiService:
      insecureSkipTLSVerify: false
    args:
    - --kubelet-insecure-tls
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 100Mi
    serviceMonitor:
      enabled: true
    tls:
      certManager:
        existingIssuer:
          enabled: true
          kind: ClusterIssuer
          name: internal-ca
      type: cert-manager
