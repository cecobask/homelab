apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-operator
  namespace: kube-system
spec:
  chart:
    spec:
      chart: intel-device-plugins-operator
      sourceRef:
        kind: HelmRepository
        name: intel
      version: 0.34.1
  dependsOn:
  - name: cert-manager
    namespace: cert-manager
  - name: node-feature-discovery
    namespace: kube-system
  interval: 1h
  values:
    manager:
      devices:
        gpu: true
    resources:
      limits: ~
      requests:
        cpu: 30m
        memory: 100Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-gpu
  namespace: kube-system
spec:
  chart:
    spec:
      chart: intel-device-plugins-gpu
      sourceRef:
        kind: HelmRepository
        name: intel
      version: 0.34.1
  dependsOn:
  - name: intel-device-plugins-operator
    namespace: kube-system
  interval: 1h
  values:
    name: gpudp
