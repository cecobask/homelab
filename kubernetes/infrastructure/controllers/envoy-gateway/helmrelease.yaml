apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  dependsOn:
  - name: cert-manager
    namespace: cert-manager
  interval: 1h
  values:
    deployment:
      envoyGateway:
        resources:
          limits: ~
          requests:
            cpu: 10m
            memory: 150Mi
    crds:
      enabled: false
